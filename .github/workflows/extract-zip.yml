Name: Extract ZIP to Root

on:
  push:
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find ZIP
        id: zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found!"
            exit 1
          fi
          echo "zip=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Extract ZIP
        run: |
          mkdir extracted
          unzip -o "${{ steps.zip.outputs.zip }}" -d extracted

      - name: Remove GitHub Workflow Folder
        run: |
          rm -rf extracted/.github
          find extracted -type d -name ".github" -exec rm -rf {} +

      - name: Copy Files to Repository Root Safely
        run: |
          # Check karo ki zip ke andar ek aur main folder hai ya direct files hain
          INNER=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
          
          if [ -n "$INNER" ] && [ "$(find extracted -mindepth 1 -maxdepth 1 | wc -l)" -eq 1 ]; then
            echo "Inner folder found: $INNER. Copying its contents..."
            # Inner folder ka saara data (files + folders) root par lao
            cp -r "$INNER"/* . 2>/dev/null || true
            cp -r "$INNER"/.[!.]* . 2>/dev/null || true
          else
            echo "No single inner folder, copying everything from extracted root..."
            cp -r extracted/* . 2>/dev/null || true
            cp -r extracted/.[!.]* . 2>/dev/null || true
          fi

      - name: Cleanup
        run: |
          rm -rf extracted
          rm -f *.zip

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Saari files ko add karo
          git add -A
          
          # Agar koi change hai to commit aur push karo
          if ! git diff --cached --quiet; then
            git commit -m "Auto extract ZIP with all Android source files"
            git push origin main
          else
            echo "No changes to commit"
          fi
